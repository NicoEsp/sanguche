      <h2>Nuestras secciones</h2>
      <ul>
        <li><a href="https://productprepa.com/autoevaluacion">Autoevaluación PM Gratis</a> — Test de 5 minutos para conocer tu nivel como Product Builder. Identificá fortalezas y áreas de mejora.</li>

        <li><a href="https://productprepa.com/starterpack">Starter Pack para PMs</a> — Recursos curados y guía paso a paso para quienes comienzan en Product Management.</li>
        <li><a href="https://productprepa.com/starterpack/build">Starter Pack: Construir Productos</a> — Guía para aprender a construir productos desde cero.</li>
        <li><a href="https://productprepa.com/starterpack/lead">Starter Pack: Liderar Equipos</a> — Para PMs que buscan dar el salto a Lead PM, GPM o Head of Product.</li>
        <li><a href="https://productprepa.com/soy-dev">Para Desarrolladores</a> — Descubrí por qué aprender Product Management es clave para devs.</li>
        <li><a href="https://productprepa.com/preguntas">Preguntas de Producto</a> — Disparadores para reflexionar sobre tu producto, tu equipo y tu rol.</li>
        <li><a href="https://productprepa.com/blog">Blog de Producto</a> — Artículos prácticos sobre Product Management, carrera en producto, entrevistas y habilidades de PM.</li>
